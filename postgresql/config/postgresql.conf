# ==========================================
# MEMÓRIA
# ==========================================
shared_buffers = 1GB              # ~25% da RAM
effective_cache_size = 3GB        # ~75% da RAM (cache do OS + shared_buffers)
work_mem = 16MB                   # Por operação (sort/join). Cuidado com picos.
maintenance_work_mem = 256MB      # Para VACUUM, CREATE INDEX, ALTER TABLE
huge_pages = try                  # Usa huge pages do Linux se disponível
temp_buffers = 32MB               # Para tabelas temporárias

# ==========================================
# CONEXÕES
# ==========================================
max_connections = 100             # Use PgBouncer se precisar de >200 conexões
superuser_reserved_connections = 3

# ==========================================
# WAL & CHECKPOINTS
# ==========================================
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
wal_buffers = 16MB
wal_compression = lz4             # PostgreSQL 14+ (reduz I/O de WAL)

# ==========================================
# DESEMPENHO
# ==========================================
random_page_cost = 1.1            # SSD/NVMe (use 4.0 para HDD)
effective_io_concurrency = 200    # SSD/NVMe (use 1 para HDD)
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 4
jit = on                          # Compilação JIT para queries complexas

# ==========================================
# LOGGING & AUDIT
# ==========================================
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_statement = 'mod'             # Log DDL/DML
log_min_duration_statement = 500  # ms (queries lentas)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0                # Log uso de arquivos temporários
log_line_prefix = '%m [%p] %q%u@%d '
timezone = 'America/Sao_Paulo'
log_timezone = 'America/Sao_Paulo'

# ==========================================
# SEGURANÇA & PADRÕES
# ==========================================
password_encryption = scram-sha-256
default_statistics_target = 100   # Aumente para 200-500 se tiver tabelas > 10M linhas