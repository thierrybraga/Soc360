# Open-Monitor v3.0 - Main Server Configuration
# Production: HTTP redireciona para HTTPS; aplicação servida apenas via TLS.
# Upstream `openmonitor_app` definido em nginx.conf (http block).

# =============================================================================
# HTTP (8080) - Apenas health check do Docker, ACME e redirect 301 -> HTTPS
# =============================================================================
server {
    listen 8080;
    server_name _;

    # Health check do container (docker-compose usa http://localhost:8080/nginx-health).
    # Mantido em HTTP de propósito para não exigir TLS no healthcheck interno.
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Desafio ACME (Let's Encrypt / certbot) deve ficar acessível por HTTP.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Todo o resto é forçado para HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS (8443) - Servidor da aplicação
# =============================================================================
server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSL Certificates (montados via ./infra/docker/nginx/ssl)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # HSTS - força HTTPS no browser por 1 ano
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Todos os blocos de location compartilhados
    include /etc/nginx/conf.d/locations.inc;
}
