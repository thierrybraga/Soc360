{% extends "base.html" %}

{% block title %}404 - Not Found | Open-Monitor{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-page__content">
        <div class="error-page__code">404</div>
        <h1 class="error-page__title">Not Found</h1>
        <p class="error-page__message">The requested resource could not be found.</p>
        
        <div class="error-page__actions">
            <a href="{{ url_for('core.dashboard') }}" class="btn btn--primary">
                <i class="fas fa-home"></i> Go to Dashboard
            </a>
            <button id="go-back-btn" class="btn btn--secondary">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>
        </div>
    </div>
    
    <div class="error-page__illustration">
        <svg viewBox="0 0 200 200" class="error-illustration">
            <circle cx="100" cy="100" r="80" fill="none" stroke="currentColor" stroke-width="2" opacity="0.2"/>
            <path d="M70 80 L130 80 M70 120 L130 120" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            <circle cx="75" cy="70" r="8" fill="currentColor"/>
            <circle cx="125" cy="70" r="8" fill="currentColor"/>
            <text x="100" y="160" text-anchor="middle" font-size="20" fill="currentColor">?</text>
        </svg>
    </div>
</div>

<style>
.error-page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    gap: var(--spacing-2xl);
    padding: var(--spacing-xl);
}

.error-page__content {
    text-align: center;
    max-width: 480px;
}

.error-page__code {
    font-size: 8rem;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: var(--spacing-md);
}

.error-page__title {
    font-size: 1.75rem;
    color: var(--text-primary);
    margin-bottom: var(--spacing-sm);
}

.error-page__message {
    color: var(--text-secondary);
    margin-bottom: var(--spacing-xl);
    line-height: 1.6;
}

.error-page__actions {
    display: flex;
    justify-content: center;
    gap: var(--spacing-md);
}

.error-page__illustration {
    width: 300px;
    height: 300px;
    color: var(--primary-500);
}

@media (max-width: 768px) {
    .error-page {
        flex-direction: column-reverse;
        padding: var(--spacing-lg);
    }
    
    .error-page__illustration {
        width: 200px;
        height: 200px;
    }
}
</style>
{% endblock %}
