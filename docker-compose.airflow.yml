# docker-compose.airflow.yml - Overlay opcional para orquestração de DAGs via Airflow
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.airflow.yml up -d
#
# Requisitos:
#   - Imagem em ./airflow/Dockerfile
#   - Arquivo ./airflow/.env com AIRFLOW__CORE__FERNET_KEY e credenciais
#   - A aplicação principal deve estar saudável antes de iniciar os DAGs

services:
  # -------------------------------------------------------------------------
  # Airflow Webserver (UI + API)
  # -------------------------------------------------------------------------
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: soc360-airflow-webserver
    restart: unless-stopped
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - soc360-airflow-data:/opt/airflow
    networks:
      - soc360-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    env_file:
      - path: ./airflow/.env
        required: false

  # -------------------------------------------------------------------------
  # Airflow Scheduler (executa DAGs)
  # -------------------------------------------------------------------------
  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: soc360-airflow-scheduler
    restart: unless-stopped
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - soc360-airflow-data:/opt/airflow
    networks:
      - soc360-network
    depends_on:
      airflow-webserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    env_file:
      - path: ./airflow/.env
        required: false

volumes:
  soc360-airflow-data:
