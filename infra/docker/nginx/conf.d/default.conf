# Open-Monitor v3.0 - Server Configuration
# HTTP and HTTPS server blocks

# =============================================================================
# HTTP Server - Redirect to HTTPS (when SSL enabled)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (always accessible)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS if SSL is configured
    # Uncomment the following block when SSL is enabled
    location / {
        return 301 https://$host$request_uri;
    }

    # Include application routes (comment out when SSL redirect is enabled)
    # include /etc/nginx/conf.d/locations.inc;
}

# =============================================================================
# HTTPS Server (uncomment when SSL certificates are available)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL Certificates
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # HSTS (uncomment after confirming SSL works)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Include application routes
    include /etc/nginx/conf.d/locations.inc;
}