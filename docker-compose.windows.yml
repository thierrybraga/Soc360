# docker-compose.windows.yml - SOC360 v1.0 (Windows / Docker Desktop)
# Stack core: nginx, app, celery-worker, celery-beat, redis
#
# Diferenças em relação ao docker-compose.yml (Linux/prod):
#   - Redis password via variável de ambiente (Docker secrets limitados no Windows)
#   - start_period reduzidos para iteração mais rápida em dev
#
# Overlays opcionais (mesmos do Linux):
#   Ollama:  docker compose -f docker-compose.windows.yml -f docker-compose.ollama.yml up -d
#   Airflow: docker compose -f docker-compose.windows.yml -f docker-compose.airflow.yml up -d

x-app-defaults: &app-defaults
  build:
    context: .
    dockerfile: Dockerfile
    target: production
  image: soc360:1.0.0
  restart: unless-stopped
  networks:
    - soc360-network
  environment: &app-env
    - FLASK_ENV=production
    - FLASK_APP=app:create_app
    - FLASK_DEBUG=0
    - PYTHONPATH=/app
    - SECRET_KEY_FILE=/run/secrets/secret_key
    - DATABASE_URL=sqlite:///instance/app.db

    # Redis
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}

    # AI Provider
    - AI_PROVIDER=${AI_PROVIDER:-openai}
    - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}

    # External APIs
    - NVD_API_KEY=${NVD_API_KEY:-}

    # Email (SMTP)
    - MAIL_SERVER=${MAIL_SERVER:-}
    - MAIL_PORT=${MAIL_PORT:-587}
    - MAIL_USE_TLS=true
    - MAIL_USERNAME=${MAIL_USERNAME:-}
    - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-noreply@soc360.local}

    # Security
    - SESSION_COOKIE_SECURE=false
    - SESSION_COOKIE_HTTPONLY=true
    - SESSION_COOKIE_SAMESITE=Lax
    - WTF_CSRF_ENABLED=true

    # Observability
    - LOG_LEVEL=${LOG_LEVEL:-INFO}

    # App Tuning
    - WORKERS=${WORKERS:-2}
    - THREADS=${THREADS:-2}
    - PORT=5000
  volumes:
    - soc360-logs:/app/logs
    - soc360-uploads:/app/uploads
    - soc360-reports:/app/reports
    - soc360-instance:/app/instance
    - soc360-static:/app/app/static
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 120s
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 2G
      reservations:
        cpus: '0.5'
        memory: 512M

x-celery-defaults: &celery-defaults
  <<: *app-defaults
  healthcheck:
    disable: true

# =============================================================================
# SERVICES
# =============================================================================
services:
  # -------------------------------------------------------------------------
  # Reverse Proxy (NGINX)
  # -------------------------------------------------------------------------
  nginx:
    build:
      context: ./infra/docker/nginx
      dockerfile: Dockerfile
    container_name: soc360-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:8080"
      - "${HTTPS_PORT:-443}:8443"
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./infra/docker/nginx/html:/usr/share/nginx/html:ro
      - soc360-static:/app/app/static:ro
      - soc360-uploads:/app/uploads:ro
      - soc360-reports:/app/reports:ro
      - soc360-nginx-logs:/var/log/nginx
    networks:
      - soc360-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # -------------------------------------------------------------------------
  # Flask Application (Gunicorn)
  # -------------------------------------------------------------------------
  app:
    <<: *app-defaults
    container_name: soc360-app
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["/entrypoint.sh"]
    command: ["gunicorn", "app:create_app()"]
    secrets:
      - secret_key

  # -------------------------------------------------------------------------
  # Celery Worker
  # -------------------------------------------------------------------------
  celery-worker:
    <<: *celery-defaults
    container_name: soc360-celery-worker
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "scripts.workers.celery_worker.celery", "worker", "--loglevel=info", "--concurrency=${CELERY_WORKERS:-2}"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A scripts.workers.celery_worker.celery inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    secrets:
      - secret_key

  # -------------------------------------------------------------------------
  # Celery Beat (Scheduler)
  # -------------------------------------------------------------------------
  celery-beat:
    <<: *celery-defaults
    container_name: soc360-celery-beat
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "scripts.workers.celery_worker.celery", "beat", "--loglevel=info"]
    secrets:
      - secret_key
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # -------------------------------------------------------------------------
  # Redis — password via env var (Docker secrets têm suporte limitado no Windows)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: soc360-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
    command: >
      sh -c "redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass $$REDIS_PASSWORD"
    volumes:
      - soc360-redis-data:/data
    networks:
      - soc360-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# =============================================================================
# SECRETS
# =============================================================================
secrets:
  secret_key:
    file: ./secrets/secret_key.txt

# =============================================================================
# NETWORKS & VOLUMES
# =============================================================================
networks:
  soc360-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  soc360-logs:
    driver: local
  soc360-uploads:
    driver: local
  soc360-reports:
    driver: local
  soc360-instance:
    driver: local
  soc360-nginx-logs:
    driver: local
  soc360-static:
    driver: local
  soc360-redis-data:
    driver: local
