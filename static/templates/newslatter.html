<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Newsletter - Open CVE</title>
  <meta name="description" content="Cadastre-se para receber atualizações sobre vulnerabilidades CVE no seu e-mail. Plataforma segura e inteligente com base em dados do NIST." />
  <meta name="keywords" content="newsletter, cibersegurança, CVE, vulnerabilidades, Open CVE, NIST, OpenAI" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Open CVE" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!-- Google AdSense -->
  <script data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

  <!-- Bootstrap & FontAwesome -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" as="style" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- Estilo personalizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm" style="min-height: 70px;">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center flex-shrink-0" href="{{ url_for('main.index') }}">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo Open CVE"
               style="max-height: 50px; width: auto;" class="img-fluid" loading="lazy">
          <span class="ms-2 fw-semibold">Open CVE Report</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.index') }}"><i class="fas fa-home me-1"></i> Início</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.about') }}"><i class="fas fa-info-circle me-1"></i> Sobre</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.contact') }}"><i class="fas fa-envelope me-1"></i> Contato</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('main.analytics') }}"><i class="fas fa-chart-line me-1"></i> Análises</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Conteúdo Principal -->
  <main class="flex-fill d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="mx-auto p-4 p-md-5 bg-light rounded shadow sr" style="max-width: 500px;">
        <h2 class="text-center mb-3 fw-bold sr">Assine a Newsletter</h2>
        <p class="text-center text-muted mb-4 sr" data-sr-delay="100">Receba atualizações sobre novas vulnerabilidades (CVEs) diretamente no seu e-mail.</p>

        <form action="/subscribe" method="POST" novalidate class="sr" data-sr-delay="200">
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control form-control-lg"
              placeholder="seuemail@exemplo.com"
              required
              autofocus
              autocomplete="email"
              aria-describedby="emailHelp"
            >
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-success btn-lg px-4 w-100">
              <i class="fas fa-paper-plane me-2"></i> Assinar
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-auto">
    <div class="container">
      <p class="mb-1">&copy; 2025 Open CVE. Todos os direitos reservados.</p>
      <a href="{{ url_for('main.contact') }}" class="text-white"><i class="fas fa-headset me-1"></i> Suporte</a>
    </div>
  </footer>

  <!-- Scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="{{ url_for('static', filename='js/script.js') }}"></script>
  <script src="https://unpkg.com/scrollreveal"></script>
  <script>
    ScrollReveal().reveal('.sr', {
      distance: '30px',
      origin: 'bottom',
      duration: 1000,
      interval: 200,
      easing: 'ease-out',
      reset: false
    });

    document.querySelectorAll('[data-sr-delay]').forEach(el => {
      ScrollReveal().reveal(el, {
        delay: parseInt(el.getAttribute('data-sr-delay')),
        distance: '30px',
        origin: 'bottom',
        duration: 1000,
        easing: 'ease-out',
        reset: false
      });
    });
  </script>
</body>
</html>
