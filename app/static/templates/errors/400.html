{% extends "base.html" %}

{% block title %}400 - Bad Request | SOC360{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-page__content">
        <div class="error-page__code">400</div>
        <h1 class="error-page__title">Bad Request</h1>
        <p class="error-page__message">{{ error if error else "The request could not be understood by the server due to malformed syntax." }}</p>
        
        <div class="error-page__actions">
            <a href="{{ url_for('core.dashboard') }}" class="btn btn--primary">
                <i class="fas fa-home"></i> Go to Dashboard
            </a>
            <button class="btn btn--secondary js-go-back">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>
        </div>
    </div>
    
    <div class="error-page__illustration">
        <svg viewBox="0 0 200 200" class="error-illustration">
            <circle cx="100" cy="100" r="80" fill="none" stroke="currentColor" stroke-width="2" opacity="0.2"/>
            <path d="M70 70 L130 130 M130 70 L70 130" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
        </svg>
    </div>
</div>

<style nonce="{{ csp_nonce() }}">
.error-page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    gap: var(--spacing-2xl);
    padding: var(--spacing-xl);
}

.error-page__content {
    text-align: center;
    max-width: 480px;
}

.error-page__code {
    font-size: 8rem;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: var(--spacing-md);
}

.error-page__title {
    font-size: 1.75rem;
    color: var(--text-primary);
    margin-bottom: var(--spacing-sm);
}

.error-page__message {
    color: var(--text-secondary);
    margin-bottom: var(--spacing-xl);
    line-height: 1.6;
}

.error-page__actions {
    display: flex;
    justify-content: center;
    gap: var(--spacing-md);
}

.error-page__illustration {
    width: 300px;
    height: 300px;
    color: var(--primary-500);
}

@media (max-width: 768px) {
    .error-page {
        flex-direction: column-reverse;
        padding: var(--spacing-lg);
    }
    
    .error-page__illustration {
        width: 200px;
        height: 200px;
    }
}
</style>
{% endblock %}
